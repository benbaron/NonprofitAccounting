  map_a:
    name: "Present state of org.nonprofitbookkeeping.ui"
    shell:
      layout:
        - "top chrome (menu + toolbar)"
        - "left navigation tree"
        - "center panel host"
        - "right inspector pane"
      routing_key: "AppPanelId"
      navigation_groups:
        operations:
          - "Ledger Register"
          - "Transaction Editor"
          - "Schedules"
          - "Budget Editor"
          - "Budget vs Actual"
          - "Asset Register"
          - "Depreciation Runs"
        outputs:
          - "Reports Library"
        reference:
          - "Chart of Accounts"
          - "Funds"
        system:
          - "Settings"
    routes:
      - route_id: "DASHBOARD"
        class: "DashboardPanel"
        quality: "hybrid_data_backed"
        notes: "Shows fund balances and embeds DashboardPanelFX workspace"
      - route_id: "LEDGER_REGISTER"
