app: nonprofitbookkeeping.ui.merged
version: 1
canonical_map_name: nonprofitbookkeeping-ui-canonical-merged-map
canonical_map_path: doc/ui/nonprofitbookkeeping-ui-canonical-merged-map.yaml

namespace_maps:
  org_nonprofitbookkeeping_ui:
    namespace: org.nonprofitbookkeeping.ui
    map_path: doc/ui/nonprofitbookkeeping-ui-map.yaml
    source_root: src/main/java/org/nonprofitbookkeeping/ui
  nonprofitbookkeeping_ui:
    namespace: nonprofitbookkeeping.ui
    map_path: doc/ui/nonprofitbookkeeping-ui-package-map.yaml
    source_root: src/main/java/nonprofitbookkeeping/ui

display_name: NonprofitBookkeeping.UI
source_of_truth:
  - src/main/java/org/nonprofitbookkeeping/ui/MainWindow.java
  - src/main/java/org/nonprofitbookkeeping/ui/NavigationPane.java
  - src/main/java/org/nonprofitbookkeeping/ui/PanelHost.java


field_semantics:
  id:
    meaning: "Unique node identifier within this YAML map (not a Java class name)."
    kind: "documentation key"
    must_be_unique: true
    resolution_rule: "May be referenced by parent, replaces, flows[*]_path entries, and diff_summary."
  target:
    meaning: "Action destination key. Usually references another id in this map, or a shell-level action key listed in target_registry."
    kind: "id reference or action key"
    resolution_rule: "If target is a panel/view, it should match some views.present/proposed id. If it is behavior, it should match target_registry. Navigable leaf panes in the left tree should use a self target (target == id)."
  trigger:
    meaning: "Interaction pattern that activates an action (UX event descriptor, not Java symbol)."
    kind: "interaction token"
    resolution_rule: "Should be chosen from trigger_registry for consistency."
  panel_class:
    meaning: "Fully-qualified Java class that implements or hosts the pane/view represented by this node."
    kind: "runtime implementation reference"
    resolution_rule: "Required for self-targeted pane nodes (target == id). For proposed nodes without implementation, use planned class name and add a migration note."

target_registry:
  active_panel_new: "Dispatches panelHost.newItemActive() from shell new action."
  active_panel_save: "Dispatches panelHost.saveActive()."
  active_panel_copy: "Dispatches panelHost.copySelectionActive()."
  active_panel_paste: "Dispatches panelHost.pasteActive()."
  inspector_search: "Opens inspector search placeholder."
  inspector_journal: "Opens inspector journal placeholder."
  inspector_info_open_not_wired: "Info message for unimplemented Open action."
  inspector_info_export_not_wired: "Info message for unimplemented Export action."
  inspector_info_undo_not_wired: "Info message for unimplemented Undo action."
  inspector_info_redo_not_wired: "Info message for unimplemented Redo action."
  inspector_info_cut_not_wired: "Info message for unimplemented Cut action."
  inspector_info_go_to_not_wired: "Info message for unimplemented Go to action."
  inspector_info_posting_not_wired: "Info message for unimplemented Post/Validate action."
  inspector_info_recalc_not_wired: "Info message for unimplemented recalculate action."
  inspector_info_tools_not_wired: "Info message for unimplemented tools action."
  inspector_info_about: "About text shown in inspector."
  toolbar_date_range_selector: "Moves focus to DateRangeSelector preset picker."
  global_date_range: "Global date range control in toolbar."
  app_exit: "Terminates application."
  selection_driven_details: "Context details from right-clicked navigation item."
  search_placeholder: "Search placeholder content in inspector."
  journal_placeholder: "Journal placeholder content in inspector."

  do_open_company: "Invokes doOpenCompany()."
  do_close_company: "Invokes doCloseCompany()."
  do_save_company: "Invokes doSaveCompany()."
  coa_tab: "Routes to the Chart of Accounts workspace tab in nonprofitbookkeeping.ui."
  journal_tab: "Routes to the Journal workspace tab in nonprofitbookkeeping.ui."
  settings: "Routes to the Settings panel target used by legacy map actions."
  reports_workspace: "Routes to the reports workspace target used by run/report actions."
  excel_template_report_action_fx: "Invokes ExcelTemplateReportActionFX."
  import_file_action_fx: "Invokes ImportFileActionFX for OFX/QFX imports."
  import_from_outlands_ledger_action_fx: "Invokes ImportFromOutlandsLedgerActionFX workflow."
  import_sca_ledger_action_fx: "Invokes ImportSCALedgerActionFX workflow."
  import_coa_xlsx_action_fx: "Invokes ImportCoaXlsxActionFX from Company menu."
  export_coa_xlsx_action_fx: "Invokes ExportCoaXlsxActionFX from Company menu."
  save_modified_copy_action_fx: "Invokes SaveModifiedCopyActionFX for SCA workbooks."
  export_file_action_fx: "Invokes ExportFileActionFX for account statements."
  start_create_wizard: "Invokes startCreateWizard()."
  open_company_selection: "Shows CompanySelectionPanelFX in main center area."
  open_workspace_tabs: "Shows TabPane workspace in main center area."
  open_subwindow_documents: "Opens DocumentsPanelFX in a separate Stage via showPanel(Node,title)."
  open_subwindow_inventory: "Opens InventoryPanelFX in a separate Stage via showPanel(Node,title)."
  open_subwindow_funds: "Opens FundsPanelFX in a separate Stage via showPanel(Node,title)."
  open_subwindow_reconciliation: "Opens LedgerReconcilePanelFX in a separate Stage via showPanel(Node,title)."
  open_subwindow_donors: "Opens DonorsPanelFX in a separate Stage via showPanel(Node,title)."
  open_subwindow_donations: "Opens DonationsPanelFX in a separate Stage via showPanel(Node,title)."
  open_subwindow_grants: "Opens GrantsPanelFX in a separate Stage via showPanel(Node,title)."
  open_subwindow_undeposited_funds: "Opens UndepositedFundsPanelFX in a separate Stage via showPanel(Node,title)."
  open_subwindow_sales_cog: "Opens SalesAndCOGPanelFX in a separate Stage via showPanel(Node,title)."
  open_subwindow_settings: "Opens SettingsPanelFX in a separate Stage via showPanel(Node,title)."
  open_subwindow_help: "Opens HelpPanelFX in a separate Stage via showPanel(Node,title)."
  open_subwindow_sql_query: "Opens SqlQueryPanelFX in a separate Stage via showPanel(Node,title)."
  handle_open_or_create_database: "Invokes handleOpenOrCreateDatabase()."
  handle_import_legacy_archive: "Invokes handleImportLegacyArchive()."
  handle_import_script_into_database: "Invokes handleImportScriptIntoDatabase()."
  plugin_add_menu_items: "Plugin hook plugin.addMenuItems(MenuBar)."
  plugin_show_details: "Shows plugin metadata alert."


trigger_registry:
  click: "Primary click/tap interaction."
  click_or_ctrl_n: "Menu click or keyboard accelerator Ctrl+N."
  click_or_ctrl_s: "Menu click or keyboard accelerator Ctrl+S."
  click_or_ctrl_z: "Menu click or keyboard accelerator Ctrl+Z."
  click_or_ctrl_y: "Menu click or keyboard accelerator Ctrl+Y."
  click_or_ctrl_x: "Menu click or keyboard accelerator Ctrl+X."
  click_or_ctrl_c: "Menu click or keyboard accelerator Ctrl+C."
  click_or_ctrl_v: "Menu click or keyboard accelerator Ctrl+V."
  click_or_ctrl_f: "Menu click or keyboard accelerator Ctrl+F."
  click_or_ctrl_g: "Menu click or keyboard accelerator Ctrl+G."
  right_click_tree_item: "Secondary-click on selected navigation tree row."
  find_actions: "Invoked from Find button/menu pathways."
  toolbar_journal: "Invoked from toolbar Journal button."

  click: "Primary click/tap interaction."
  click_or_ctrl_o: "Menu click or keyboard accelerator Ctrl+O."
  click_or_ctrl_w: "Menu click or keyboard accelerator Ctrl+W."
  click_or_ctrl_s: "Menu click or keyboard accelerator Ctrl+S."
  click_or_ctrl_j: "Menu click or keyboard accelerator Ctrl+J."
  

views:
  present:
    - id: app_shell
      title: MainWindow shell
      type: pane
      route: shell://main
      parent: null
      menu_entry: { label: Application Shell, location: hidden }
      children:

#
# top chrome
#      
        - id: top_chrome
          title: Top chrome
          type: pane
          menu_entry: { label: Top Chrome, location: hidden }
          children:
          
            - id: file_menu
              title: File
              type: menu
              menu_entry: { label: File, location: topbar, order: 1 }
              actions:
                - { id: file_new, label: New, target: active_panel_new, trigger: click_or_ctrl_n }
                - { id: file_open, label: Open…, target: inspector_info_open_not_wired, trigger: click }
                - { id: file_save, label: Save, target: active_panel_save, trigger: click_or_ctrl_s }
                - { id: file_export, label: Export…, target: inspector_info_export_not_wired, trigger: click }
                - { id: file_exit, label: Exit, target: app_exit, trigger: click }
              children:
                - id: company_menu
                  title: Company
                  type: menu
                  actions:
                    - { id: company_open, label: Open Company, target: do_open_company, trigger: click_or_ctrl_o }
                    - { id: company_close, label: Close Company, target: do_close_company, trigger: click_or_ctrl_w }
                    - { id: company_save, label: Save Company, target: do_save_company, trigger: click_or_ctrl_s }
                    
            - id: edit_menu
              title: Edit
              type: menu
              menu_entry: { label: Edit, location: topbar, order: 2 }
              actions:
                - { id: edit_undo, label: Undo, target: inspector_info_undo_not_wired, trigger: click_or_ctrl_z }
                - { id: edit_redo, label: Redo, target: inspector_info_redo_not_wired, trigger: click_or_ctrl_y }
                - { id: edit_cut, label: Cut, target: inspector_info_cut_not_wired, trigger: click_or_ctrl_x }
                - { id: edit_copy, label: Copy, target: active_panel_copy, trigger: click_or_ctrl_c }
                - { id: edit_paste, label: Paste, target: active_panel_paste, trigger: click_or_ctrl_v }
                - { id: edit_create_or_edit_company, label: Create or Edit Company, target: start_create_wizard, trigger: click }
                - { id: edit_chart_of_accounts, label: Edit Chart of Accounts, target: coa_tab, trigger: click }
                - { id: edit_journal, label: Edit Journal, target: journal_tab, trigger: click_or_ctrl_j }
                
            - id: search_menu
              title: Search
              type: menu
              menu_entry: { label: Search, location: topbar, order: 3 }
              actions:
                - { id: search_find, label: Find…, target: inspector_search, trigger: click_or_ctrl_f }
                - { id: search_go_to, label: Go to…, target: inspector_info_go_to_not_wired, trigger: click_or_ctrl_g }
                - { id: search_date_range, label: Date Range…, target: toolbar_date_range_selector, trigger: click }
                
            - id: run_menu
              title: Run
              type: menu
              menu_entry: { label: Run, location: topbar, order: 4 }
              actions:
                - { id: run_post_validate, label: Post / Validate, target: inspector_info_posting_not_wired, trigger: click }
                - { id: run_recalculate, label: Recalculate summaries, target: inspector_info_recalc_not_wired, trigger: click }
                - { id: run_documents, label: Documents & Attachments, target: open_subwindow_documents, trigger: click }
                - { id: run_inventory, label: Inventory & Depreciation, target: inventory, trigger: click }
                - { id: run_funds, label: Funds & Fund Accounting, target: open_subwindow_funds, trigger: click }
                - { id: run_excel_template_report, label: Excel Template Report..., target: excel_template_report_action_fx, trigger: click }
                - { id: run_reconcile, label: Reconcile, target: open_subwindow_reconciliation, trigger: click }
              children:
                - id: inventory
                  title: Inventory
                  type: pane
                  target: inventory
                  panel_class: org.nonprofitbookkeeping.ui.InventoryPanel
                  parent: run_menu
                - id: reports
                  title: Reports
                  type: pane
                  target: reports_workspace
                  panel_class: org.nonprofitbookkeeping.ui.ReportLibraryPanel
                  parent: run_menu
                
            - id: tools_menu
              title: Tools
              type: menu
              menu_entry: { label: Tools, location: topbar, order: 5 }
              actions:
                - id: import_menu
                  title: Import
                  type: menu
                  actions:
                    - { id: import_financial_file, label: Import Financial (OFX, QFX) File..., target: import_file_action_fx, trigger: click }
                    - { id: import_outlands_ledger, label: Import Outlands Ledger..., target: import_from_outlands_ledger_action_fx, trigger: click }
                    - { id: import_sca_ledger, label: Import SCA Ledger..., target: import_sca_ledger_action_fx, trigger: click }
                    - { id: company_import_coa_xlsx, label: Import COA (XLSX), target: import_coa_xlsx_action_fx, trigger: click }
                    - { id: company_export_coa_xlsx, label: Export COA (XLSX), target: export_coa_xlsx_action_fx, trigger: click }     
                    
                - id: export_menu
                  title: Export
                  type: menu
                  actions:
                    - { id: export_save_modified_sca_workbook, label: Save Modified SCA Workbook..., target: save_modified_copy_action_fx, trigger: click }
                    - { id: export_account_statement, label: Export Account Statement (OFX/QFX)..., target: export_file_action_fx, trigger: click }

            - id: panels_menu
              title: Panels
              type: menu
              menu_entry: { label: Panels, location: topbar, order: 6 }
              actions:
                - { id: panel_donors, label: Donors, target: open_subwindow_donors, trigger: click }
                - { id: panel_donations, label: Donations, target: open_subwindow_donations, trigger: click }
                - { id: panel_grants, label: Grants, target: open_subwindow_grants, trigger: click }
                - { id: panel_undeposited_funds, label: Undeposited Funds, target: open_subwindow_undeposited_funds, trigger: click }
                - { id: panel_sales_cog, label: Sales & COG, target: open_subwindow_sales_cog, trigger: click }
                              
            - id: database_menu
              title: Database
              type: menu
              menu_entry: { label: Database, location: topbar, order: 7 }
              actions:
                - { id: db_open_or_create_h2, label: Open/Create H2 DB..., target: handle_open_or_create_database, trigger: click }
                - { id: db_import_legacy_archive, label: Import Legacy .npbk Archive..., target: handle_import_legacy_archive, trigger: click }
                - { id: db_import_h2_script, label: Import H2 script into DB..., target: handle_import_script_into_database, trigger: click }
                - { id: db_run_sql_query, label: Run SQL Query..., target: open_subwindow_sql_query, trigger: click }
                 
            - id: plugins_menu
              title: Plugins
              type: menu
              menu_entry: { label: Plugins, location: topbar, order: 8 }
              actions:
                - { id: plugin_info_entry, label: <plugin-name>, target: plugin_show_details, trigger: click }
                - { id: plugin_contributed_items, label: <plugin-contributed>, target: plugin_add_menu_items, trigger: click }
              notes: "Actual plugin items are dynamic at runtime and depend on loadedPlugins."                    

            - id: settings_menu
              title: Settings
              type: menu
              menu_entry: { label: Settings, location: topbar, order: 9 }
              actions:
                - { id: tools_preferences, label: Preferences…, target: settings, panel_class: org.nonprofitbookkeeping.ui.SettingsPanel, trigger: click }
                
            - id: help_menu
              title: Help
              type: menu
              menu_entry: { label: Help, location: topbar, order: 10 }
              actions:
                - { id: help_about, label: About, target: inspector_info_about, trigger: click }
                - { id: help_show, label: Help, target: open_subwindow_help, trigger: click }                                  
 
#
# navigation tree
#
 
        - id: navigation_tree
          title: Navigation tree
          type: pane
          menu_entry: { label: Left navigation, location: sidebar, order: 1 }
          children:          
            - id: nav_operations
              title: Operations
              type: group
              children:              
                - id: nav_ledger
                  title: Ledger
                  type: group
                  children:                  
                    - id: ledger_register
                      title: Ledger Register
                      type: pane
                      target: ledger_register
                      panel_class: org.nonprofitbookkeeping.ui.LedgerRegisterPanel
                      
                - id: schedules
                  title: Outstanding / Schedules
                  type: pane
                  target: schedules
                  panel_class: org.nonprofitbookkeeping.ui.SchedulesPanel
                  
                - id: nav_budget
                  title: Budget
                  type: group
                  children:                  
                    - id: budget_editor
                      title: Budget Editor
                      type: pane
                      target: budget_editor
                      panel_class: org.nonprofitbookkeeping.ui.BudgetEditorPanel
                      
                    - id: budget_vs_actual
                      title: Budget vs Actual
                      type: pane
                      target: budget_vs_actual
                      panel_class: org.nonprofitbookkeeping.ui.BudgetVsActualPanel
                - id: nav_assets
                  title: Assets
                  type: group
                  children:
                    - id: assets_register
                      title: Asset Register
                      type: pane
                      target: assets_register
                      panel_class: org.nonprofitbookkeeping.ui.AssetsRegisterPanel
                      
                    - id: depreciation_runs
                      title: Depreciation Runs
                      type: pane
                      target: depreciation_runs
                      panel_class: org.nonprofitbookkeeping.ui.DepreciationRunsPanel                      
                  
                - id: nav_reference
                  title: Reference
                  type: group
                  children:
                    - id: chart_of_accounts
                      title: Chart of Accounts
                      type: pane
                      target: chart_of_accounts
                      panel_class: org.nonprofitbookkeeping.ui.ChartOfAccountsPanel
                      
                    - id: funds
                      title: Funds
                      type: pane
                      target: funds
                      panel_class: org.nonprofitbookkeeping.ui.FundsPanel
                  
flows:
  - id: post_journal_entry
    actor: accountant
    present_path:
      - nav_operations
      - nav_ledger
      - ledger_register
      - run_menu
      - run_post_validate
    proposed_path:
      - nav_operations
      - dashboard
      - run_menu
      - run_post_validate

  - id: review_financial_reports
    actor: finance_manager
    present_path:
      - nav_outputs
      - report_library
      - inspector
    proposed_path:
      - nav_outputs
      - reports_workspace
      - inspector

diff_summary:
  added: [dashboard, inventory, reports_workspace, settings_dialog]
  removed: []
  moved: []
  renamed: []

merge_contract:
  precedence:
    - explicit_user_scope
    - explicit_map_reference
    - panel_class_majority_fallback
  cross_namespace_policy: explicit_opt_in_required
