name: UI Map Validation

on:
  pull_request:
    paths:
      - 'doc/ui/**'
      - 'scripts/validate_ui_maps.py'
      - '.github/workflows/ui-map-validation.yml'
      - 'pom.xml'
      - 'src/**'
  push:
    branches: [ main ]
    paths:
      - 'doc/ui/**'
      - 'scripts/validate_ui_maps.py'
      - '.github/workflows/ui-map-validation.yml'
      - 'pom.xml'
      - 'src/**'

jobs:
  validate-ui-maps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validator dependency
        run: pip install pyyaml

      - name: Validate namespace UI maps
        run: python scripts/validate_ui_maps.py

      - name: Validate canonical merged map
        run: python scripts/validate_ui_maps.py --map doc/ui/nonprofitbookkeeping-ui-canonical-merged-map.yaml

  maven-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run unit tests
        run: mvn test -q
