name: Maven Tests

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  maven-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          if ! mvn test -q > maven-test.log 2>&1; then
            tail -n 250 maven-test.log
            exit 1
          fi
