name: Maven Tests

on:
  pull_request:
    paths:
      - '.github/workflows/maven-tests.yml'
      - 'pom.xml'
      - 'src/**'
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/maven-tests.yml'
      - 'pom.xml'
      - 'src/**'

jobs:
  maven-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run unit tests
        run: mvn test -q
