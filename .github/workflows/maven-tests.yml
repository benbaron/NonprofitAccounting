name: Maven Tests

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  maven-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run unit tests
        shell: bash
        run: mvn test -q > maven-test.log 2>&1

      - name: Upload Maven failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maven-test-log
          path: maven-test.log
          if-no-files-found: error
